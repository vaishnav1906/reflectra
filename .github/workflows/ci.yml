name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  backend-build:
    name: Build & push backend Docker image (optional)
    if: ${{ secrets.GHCR_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/reflectra-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/reflectra-backend:latest

  deploy-backend-cloudrun:
    name: Deploy backend to Cloud Run (optional)
    needs: backend-build
    if: ${{ secrets.GCP_SA_KEY != '' && secrets.GHCR_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker to use gcloud as a credential helper
        run: |
          gcloud --quiet auth configure-docker
      - name: Pull image from GHCR
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/reflectra-backend:latest
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: reflectra-backend
          image: ghcr.io/${{ github.repository_owner }}/reflectra-backend:latest
          region: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}

  notify-render:
    name: Trigger Render deploy hook (optional)
    needs: [frontend-build, backend-build]
    if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          echo "Triggering Render deploy hook"
          curl -X POST -sS "${{ secrets.RENDER_DEPLOY_HOOK }}"
